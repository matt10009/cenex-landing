<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Cenex AI Research</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #e8e4df;
    --text-dim: #8a8580;
    --text-faint: #5a5550;
    --accent: #c4463a;
    --accent-soft: #d4756c;
    --border: #2a2725;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Newsreader', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .code {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-soft);
    margin-bottom: 1.5rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 0.75rem;
  }

  p {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 2.5rem;
  }

  a {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    padding: 0.6rem 1.4rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: all 0.3s;
  }

  a:hover {
    border-color: var(--accent-soft);
    color: var(--accent-soft);
  }
</style>
</head>
<body>
  <div class="code">404 — Not found</div>
  <h1>Nothing here</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">← Back to research</a>
</body>
</html>
